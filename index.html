<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Factorisation Blitz - Dad Joke Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --quadratic-color: #f59e0b;
            --factor-color: #3b82f6;
            --match-color: #10b981;
            --error-color: #ef4444;
            --text: #f8fafc;
            --accent: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            width: 100%;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #joke-container {
            background: #1e1b4b;
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 0.9rem;
        }

        #joke-setup {
            font-style: italic;
            color: #c4b5fd;
            margin-bottom: 4px;
        }

        #joke-punchline {
            font-weight: bold;
            color: var(--match-color);
            background: #000;
            padding: 2px 6px;
            border-radius: 4px;
            filter: blur(5px);
            transition: filter 0.5s ease;
            display: inline-block;
        }

        #joke-punchline.revealed {
            filter: blur(0);
            background: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }
        .stat-value { font-size: 1rem; font-weight: bold; display: block; }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 10px;
            width: 100%;
        }

        @media (min-width: 600px) {
            #grid { grid-template-columns: repeat(6, 1fr); }
        }

        .tile {
            aspect-ratio: 1 / 1;
            background: var(--card-bg);
            border: 2px solid #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            text-align: center;
            padding: 2px;
            word-break: break-word;
            overflow: hidden;
        }

        @media (min-width: 400px) {
            .tile { font-size: 0.85rem; }
        }

        .tile:hover { background: #334155; }
        .tile.selected { background: #475569; border-color: var(--text); transform: scale(1.02); z-index: 2; }
        .tile.quadratic { color: var(--quadratic-color); border-color: var(--quadratic-color); }
        .tile.factor { color: var(--factor-color); border-color: var(--factor-color); }

        .tile.matched {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }

        .instruction-box {
            text-align: left;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            max-width: 450px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .btn {
            background: var(--match-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="width: 100%; max-width: 550px; display: flex; flex-direction: column; align-items: center;">
        <h1 style="color: var(--match-color); font-size: 1.8rem; margin-bottom: 5px;">FACTORISATION BLITZ</h1>
        <h3 style="margin: 0; color: var(--accent);">Progressive Difficulty</h3>
        
        <div class="instruction-box">
            <b>Game Rules:</b>
            <p>1. Select <b>ONE</b> <span style="color: var(--quadratic-color);">Equation</span>.</p>
            <p>2. Select <b>TWO</b> <span style="color: var(--factor-color);">Factors</span>.</p>
            <p>3. Solve the board to reveal a <b>Dad Joke</b>!</p>
            <p><i>Levels 1-3 start with smaller numbers (under 20).</i></p>
        </div>
        
        <button class="btn" onclick="startGame()">START LEVEL 1</button>
    </div>
</div>

<div id="game-container">
    <div id="joke-container">
        <div id="joke-setup">Loading joke...</div>
        <div><span id="joke-punchline">?????????</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Level</span>
            <span id="level-val" class="stat-value">1</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Streak</span>
            <span id="streak-val" class="stat-value" style="color:var(--match-color)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Board</span>
            <span id="match-val" class="stat-value">0 / 8</span>
        </div>
    </div>

    <div id="grid"></div>
    
    <div id="next-level-area" style="display: none; margin-top: 10px;">
        <button class="btn" style="width: 100%; max-width: none;" onclick="nextLevel()">NEXT LEVEL →</button>
    </div>
</div>

<script>
    let level = 1;
    let perfectStreak = 0;
    let matchesInCurrentBoard = 0;
    let mistakesInCurrentBoard = 0;
    let selectedTiles = [];
    let lastJokeIndex = -1;

    const jokes = [
        { s: "Why was the algebra teacher so frustrated?", p: "Because they kept looking for their X and couldn't find Y!" },
        { s: "What do you call a man who spent all summer at the beach?", p: "A Tangent!" },
        { s: "Why did the student wear glasses in math class?", p: "To improve their di-vision!" },
        { s: "What did the triangle say to the circle?", p: "You're pointless!" },
        { s: "Why is the obtuse triangle so frustrated?", p: "Because it's never right!" },
        { s: "Why did the student get upset when their teacher called them 'Average'?", p: "It was a mean thing to say!" },
        { s: "Why are math books so depressed?", p: "Because they have so many problems!" },
        { s: "Parallel lines have so much in common...", p: "It’s a shame they’ll never meet!" },
        { s: "Why should you never talk to Pi?", p: "Because it goes on and on and on!" },
        { s: "What do you call an empty parrot cage?", p: "A Polygon!" }
    ];
    
    // 100 Question Pool sorted by complexity of the constant term (absolute value of product)
    const questionPool = [
        // GROUP A: Products < 20 (Easy Start) - 30 items
        { q: "x² + 4x + 3", a: 3, b: 1 }, { q: "x² - 4x + 3", a: -3, b: -1 }, { q: "x² + 2x - 3", a: 3, b: -1 }, { q: "x² - 2x - 3", a: -3, b: 1 },
        { q: "x² + 5x + 4", a: 4, b: 1 }, { q: "x² - 5x + 4", a: -4, b: -1 }, { q: "x² + 3x - 4", a: 4, b: -1 }, { q: "x² - 3x - 4", a: -4, b: 1 },
        { q: "x² + 5x + 6", a: 2, b: 3 }, { q: "x² - 5x + 6", a: -2, b: -3 }, { q: "x² + x - 6", a: 3, b: -2 }, { q: "x² - x - 6", a: -3, b: 2 },
        { q: "x² + 6x + 8", a: 4, b: 2 }, { q: "x² - 6x + 8", a: -4, b: -2 }, { q: "x² + 2x - 8", a: 4, b: -2 }, { q: "x² - 2x - 8", a: -4, b: 2 },
        { q: "x² + 7x + 10", a: 2, b: 5 }, { q: "x² - 7x + 10", a: -2, b: -5 }, { q: "x² + 3x - 10", a: 5, b: -2 }, { q: "x² - 3x - 10", a: -5, b: 2 },
        { q: "x² + 8x + 12", a: 6, b: 2 }, { q: "x² - 8x + 12", a: -6, b: -2 }, { q: "x² + 4x - 12", a: 6, b: -2 }, { q: "x² - 4x - 12", a: -6, b: 2 }, { q: "x² + 13x + 12", a: 12, b: 1 },
        { q: "x² + 7x + 12", a: 4, b: 3 }, { q: "x² - x - 12", a: -4, b: 3 }, { q: "x² + 11x + 18", a: 9, b: 2 }, { q: "x² - 11x + 18", a: -9, b: -2 }, { q: "x² + 7x - 18", a: 9, b: -2 },

        // GROUP B: Products 20 to 50 (Medium) - 40 items
        { q: "x² + 9x + 20", a: 4, b: 5 }, { q: "x² - 9x + 20", a: -4, b: -5 }, { q: "x² + x - 20", a: 5, b: -4 }, { q: "x² - x - 20", a: -5, b: 4 }, { q: "x² + 12x + 20", a: 10, b: 2 },
        { q: "x² - 12x + 20", a: -10, b: -2 }, { q: "x² + 8x - 20", a: 10, b: -2 }, { q: "x² - 8x - 20", a: -10, b: 2 }, { q: "x² + 10x + 21", a: 7, b: 3 }, { q: "x² - 10x + 21", a: -7, b: -3 },
        { q: "x² + 4x - 21", a: 7, b: -3 }, { q: "x² - 4x - 21", a: -7, b: 3 }, { q: "x² + 11x + 24", a: 8, b: 3 }, { q: "x² - 11x + 24", a: -8, b: -3 }, { q: "x² + 10x + 24", a: 6, b: 4 },
        { q: "x² + 2x - 24", a: 6, b: -4 }, { q: "x² - 2x - 24", a: -6, b: 4 }, { q: "x² + 10x + 25", a: 5, b: 5 }, { q: "x² - 10x + 25", a: -5, b: -5 }, { q: "x² + 13x + 30", a: 10, b: 3 },
        { q: "x² - 13x + 30", a: -10, b: -3 }, { q: "x² + 7x - 30", a: 10, b: -3 }, { q: "x² - 7x - 30", a: -10, b: 3 }, { q: "x² + 11x + 30", a: 6, b: 5 }, { q: "x² - x - 30", a: -6, b: 5 },
        { q: "x² + x - 30", a: 6, b: -5 }, { q: "x² + 12x + 32", a: 8, b: 4 }, { q: "x² - 12x + 32", a: -8, b: -4 }, { q: "x² + 4x - 32", a: 8, b: -4 }, { q: "x² - 4x - 32", a: -8, b: 4 },
        { q: "x² + 12x + 35", a: 7, b: 5 }, { q: "x² - 12x + 35", a: -7, b: -5 }, { q: "x² + 2x - 35", a: 7, b: -5 }, { q: "x² - 2x - 35", a: -7, b: 5 }, { q: "x² + 13x + 40", a: 8, b: 5 },
        { q: "x² - 13x + 40", a: -8, b: -5 }, { q: "x² + 3x - 40", a: 8, b: -5 }, { q: "x² - 3x - 40", a: -8, b: 5 }, { q: "x² + 14x + 45", a: 9, b: 5 }, { q: "x² - 14x + 45", a: -9, b: -5 },

        // GROUP C: Products 50 to 121 (Hard) - 30 items
        { q: "x² + 4x - 45", a: 9, b: -5 }, { q: "x² - 4x - 45", a: -9, b: 5 }, { q: "x² + 14x + 48", a: 6, b: 8 }, { q: "x² - 14x + 48", a: -6, b: -8 }, { q: "x² + 2x - 48", a: 8, b: -6 },
        { q: "x² - 2x - 48", a: -8, b: 6 }, { q: "x² + 15x + 50", a: 10, b: 5 }, { q: "x² - 15x + 50", a: -10, b: -5 }, { q: "x² + 5x - 50", a: 10, b: -5 }, { q: "x² - 5x - 50", a: -10, b: 5 },
        { q: "x² + 16x + 60", a: 10, b: 6 }, { q: "x² - 16x + 60", a: -10, b: -6 }, { q: "x² + 4x - 60", a: 10, b: -6 }, { q: "x² - 4x - 60", a: -10, b: 6 }, { q: "x² + 16x + 64", a: 8, b: 8 },
        { q: "x² - 16x + 64", a: -8, b: -8 }, { q: "x² + 17x + 72", a: 9, b: 8 }, { q: "x² - 17x + 72", a: -9, b: -8 }, { q: "x² + x - 72", a: 9, b: -8 }, { q: "x² - x - 72", a: -9, b: 8 },
        { q: "x² + 18x + 80", a: 10, b: 8 }, { q: "x² - 18x + 80", a: -10, b: -8 }, { q: "x² + 2x - 80", a: 10, b: -8 }, { q: "x² - 2x - 80", a: -10, b: 8 }, { q: "x² + 19x + 90", a: 9, b: 10 },
        { q: "x² - 19x + 90", a: -9, b: -10 }, { q: "x² + x - 90", a: 10, b: -9 }, { q: "x² - x - 90", a: -10, b: 9 }, { q: "x² + 25x + 100", a: 20, b: 5 }, { q: "x² + 26x + 120", a: 20, b: 6 }
    ];

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        level = 1;
        perfectStreak = 0;
        initBoard();
    }

    function initBoard() {
        matchesInCurrentBoard = 0;
        mistakesInCurrentBoard = 0;
        selectedTiles = [];
        document.getElementById('next-level-area').style.display = 'none';
        
        let randomIdx;
        do { randomIdx = Math.floor(Math.random() * jokes.length); } while (randomIdx === lastJokeIndex);
        lastJokeIndex = randomIdx;
        const joke = jokes[randomIdx];
        
        document.getElementById('joke-setup').innerText = `Level ${level} Mystery: "${joke.s}"`;
        const punchline = document.getElementById('joke-punchline');
        punchline.innerText = joke.p;
        punchline.classList.remove('revealed');
        
        updateStats();
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        // --- Progressive Difficulty Logic ---
        let allowedPool;
        if (level <= 3) {
            // First 3 levels: Only Group A (Numbers < 20)
            allowedPool = questionPool.slice(0, 30);
        } else if (level <= 7) {
            // Level 4-7: Group A + B (Numbers < 50)
            allowedPool = questionPool.slice(0, 70);
        } else {
            // Level 8+: Full Pool
            allowedPool = questionPool;
        }

        const sets = [...allowedPool].sort(() => 0.5 - Math.random()).slice(0, 8);
        const tiles = [];

        sets.forEach(set => {
            tiles.push({ text: set.q, type: 'quadratic', valA: set.a, valB: set.b });
            tiles.push({ text: `(x ${set.a >= 0 ? '+' : '-'} ${Math.abs(set.a)})`, type: 'factor', val: set.a });
            tiles.push({ text: `(x ${set.b >= 0 ? '+' : '-'} ${Math.abs(set.b)})`, type: 'factor', val: set.b });
        });

        tiles.sort(() => 0.5 - Math.random());

        tiles.forEach(tileData => {
            const el = document.createElement('div');
            el.className = `tile ${tileData.type}`;
            el.innerHTML = tileData.text.replace(/²/g, '<sup>2</sup>');
            el.dataset.type = tileData.type;
            if (tileData.type === 'quadratic') {
                el.dataset.valA = tileData.valA;
                el.dataset.valB = tileData.valB;
            } else {
                el.dataset.val = tileData.val;
            }
            el.onclick = () => selectTile(el);
            grid.appendChild(el);
        });
    }

    function updateStats() {
        document.getElementById('level-val').innerText = level;
        document.getElementById('streak-val').innerText = perfectStreak;
        document.getElementById('match-val').innerText = `${matchesInCurrentBoard} / 8`;
    }

    function selectTile(el) {
        if (el.classList.contains('matched') || el.classList.contains('selected') || matchesInCurrentBoard === 8) return;
        if (selectedTiles.length < 3) {
            el.classList.add('selected');
            selectedTiles.push(el);
        }
        if (selectedTiles.length === 3) checkMatch();
    }

    function checkMatch() {
        const quad = selectedTiles.find(t => t.dataset.type === 'quadratic');
        const factors = selectedTiles.filter(t => t.dataset.type === 'factor');

        let isCorrect = false;

        if (quad && factors.length === 2) {
            const targetA = parseInt(quad.dataset.valA);
            const targetB = parseInt(quad.dataset.valB);
            const f1 = parseInt(factors[0].dataset.val);
            const f2 = parseInt(factors[1].dataset.val);

            if ((f1 === targetA && f2 === targetB) || (f1 === targetB && f2 === targetA)) {
                isCorrect = true;
            }
        }

        if (isCorrect) {
            selectedTiles.forEach(t => t.classList.add('matched'));
            matchesInCurrentBoard++;
            updateStats();
            if (matchesInCurrentBoard === 8) revealReward();
        } else {
            mistakesInCurrentBoard++;
            perfectStreak = 0;
            updateStats();
            selectedTiles.forEach(t => {
                t.style.borderColor = "var(--error-color)";
                t.style.color = "var(--error-color)";
            });
            setTimeout(() => {
                selectedTiles.forEach(t => {
                    t.classList.remove('selected');
                    t.style.borderColor = "";
                    t.style.color = "";
                });
                selectedTiles = [];
            }, 400);
            return;
        }
        selectedTiles = [];
    }

    function revealReward() {
        document.getElementById('joke-punchline').classList.add('revealed');
        document.getElementById('next-level-area').style.display = 'block';
        if (mistakesInCurrentBoard === 0) {
            perfectStreak++;
            updateStats();
        }
    }

    function nextLevel() {
        level++;
        initBoard();
    }
</script>

</body>
</html>
